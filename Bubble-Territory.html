<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bubble Territory</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>


    <style>
        .scoreboard { font-size: 1.3rem; font-weight: bold; margin-bottom: 20px; background: #fff; padding: 10px 30px; border-radius: 50px; }
        
        /* CSS Grid holding 7x7 */
        .board { 
            display: grid; 
            grid-template-columns: 15px 70px 15px 70px 15px 70px 15px; 
            grid-template-rows: 15px 70px 15px 70px 15px 70px 15px;
            background: rgba(224, 235, 245, 0.8); 
            padding: 20px; 
            border-radius: 20px; 
        }
        
        /* Game Pieces */
        .dot { background: #a1b8d4; border-radius: 50%; width: 15px; height: 15px; }
        .line { background: #ffffff; cursor: pointer; border-radius: 5px; }
        .line.active.p1 { background: #a1c4fd; } 
        .line.active.p2 { background: #ffb8b8; }
        .line.v { height: 70px; width: 15px; } 
        .line.h { height: 15px; width: 70px; }
        .box { width: 70px; height: 70px; border-radius: 10px; } 
        .box.p1 { background: #a1c4fd; transform: scale(0.9); } 
        .box.p2 { background: #ffb8b8; transform: scale(0.9); }
        #status { margin-top: 25px; font-size: 1.5rem; font-weight: bold; height: 35px; }
    </style>
</head>



<body>
    
    <div class="header-title">Bubble Territory</div>
    <a href="index.html" class="subtitle">⬅ Back</a>
    
    <div class="scoreboard">
        <span style="color:#a1c4fd" id="n1">P1</span>: <span id="s1">0</span> | 
        <span style="color:#ffb8b8" id="n2">P2</span>: <span id="s2">0</span>
    </div>
    
    <div class="board" id="board"></div>
    <div id="status"></div>
    <button class="btn" onclick="init()" style="margin-top:20px;">Play Again</button>



    
    <script>
        // Check logged in
        if(localStorage.getItem('systemLoggedIn') !== 'true') {
            window.location.href = 'login.php';
        }

        let p1 = localStorage.getItem('p1Name') || "P1";
        let p2 = localStorage.getItem('p2Name') || "P2";
        
        let turn;   
        let active; 
        let boxes;  
        let scores; 



        // bilding the board
        function init() {
            
            $('#board').empty(); 
            turn = 1; 
            active = true; 
            boxes = []; 
            scores = {1: 0, 2: 0};
            
            $('#n1').text(p1); 
            $('#n2').text(p2); 
            $('#s1').text('0'); 
            $('#s2').text('0');
            $('#status').text(p1 + "'s Turn").css("color", "#a1c4fd");
            

            $.post('Score.php', { action: 'increment_stat', game: 'Bubble Territory' });
            
            // create 7x7 grid 
            for (let row = 0; row < 7; row++) {
                for (let col = 0; col < 7; col++) {
                    
                    // Give ID like : "c-1-1"
                    let el = $('<div id="c-' + row + '-' + col + '"></div>');
                    
                    let isRowEven = (row % 2 === 0);
                    let isColEven = (col % 2 === 0);
                    
                    
                    if (isRowEven && isColEven) {
                        el.addClass('dot'); 
                        
                    } else if (isRowEven && !isColEven) {
                        el.addClass('line h'); 
                        
                    } else if (!isRowEven && isColEven) {
                        el.addClass('line v');
                        
                    } else { 
                        // Empty Box 
                        el.addClass('box'); 
                        
                        // Save the building's coordinates to check it later
                        boxes.push({ id: 'c-' + row + '-' + col, r: row, c: col }); 
                    }
                    
                    $('#board').append(el);
                }
            }
        }

        
        






        $(document).on('click', '.line:not(.active)', function() {
            
            if (!active) return;
            
            let turnClass = 'p' + turn;
            $(this).addClass('active ' + turnClass); 
            

            let madeABox = false;
            
            // Check each building to see if it's surrounded by active roads
            boxes.forEach(function(box) {
                
                let currentBuilding = $('#' + box.id); 
                
                // If its already colored in, skip it
                if (currentBuilding.hasClass('p1') || currentBuilding.hasClass('p2')) {
                    return;
                }
                


                // To see if a box is surrounded
                let bRow = box.r;
                let bCol = box.c;
                
                // Look 1 row UP ,DOWN , Left , Right
                let topRoadId = '#c-' + (bRow - 1) + '-' + bCol;

                let bottomRoadId = '#c-' + (bRow + 1) + '-' + bCol;

                let leftRoadId = '#c-' + bRow + '-' + (bCol - 1);

                let rightRoadId = '#c-' + bRow + '-' + (bCol + 1);



                // Check if all 4 surrounding is clicked 
                let topClicked = $(topRoadId).hasClass('active');
                let bottomClicked = $(bottomRoadId).hasClass('active');
                let leftClicked = $(leftRoadId).hasClass('active');
                let rightClicked = $(rightRoadId).hasClass('active');



                if (topClicked && bottomClicked && leftClicked && rightClicked) {
                    
                    currentBuilding.addClass(turnClass); 
                    scores[turn]++; 
                    madeABox = true;        //extra turn
                }
            });
            
            if (!madeABox) {
                if (turn === 1) { turn = 2; }
                else { turn = 1; }
            }
            
            $('#s1').text(scores[1]); 
            $('#s2').text(scores[2]);
            






            // If all 9 
            if (scores[1] + scores[2] === 9) {
                
                active = false;
                let winner;
                
                if (scores[1] > scores[2]) { winner = p1; }
                else { winner = p2; }
                
                $('#status').text(winner + " Wins!");
                setTimeout(() => { alert(winner + " Wins!"); }, 100); 
                


                // Save score to database
                $.post('Score.php', { action: 'save_win', winner: winner, game: 'Bubble Territory' });
                
            } else { 
                
                if (turn === 1) {
                    $('#status').text(p1 + "'s Turn").css("color", "#a1c4fd");
                } else {
                    $('#status').text(p2 + "'s Turn").css("color", "#ffb8b8");
                }
            }
        });
        
        init();
        
    </script>
</body>
</html>
