<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bubble Territory</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        .scoreboard { font-size: 1.3rem; font-weight: bold; margin-bottom: 20px; background: #fff; padding: 10px 30px; border-radius: 50px; }
        .board { 
            display: grid; 
            grid-template-columns: 15px 70px 15px 70px 15px 70px 15px 70px 15px; 
            grid-template-rows: 15px 70px 15px 70px 15px 70px 15px 70px 15px;
            background: rgba(224, 235, 245, 0.8); padding: 20px; border-radius: 20px; 
        }
        .dot { background: #a1b8d4; border-radius: 50%; width: 15px; height: 15px; }
        .line { background: #ffffff; cursor: pointer; border-radius: 5px; }
        .line.active.p1 { background: #a1c4fd; } .line.active.p2 { background: #ffb8b8; }
        .line.v { height: 70px; width: 15px; } .line.h { height: 15px; width: 70px; }
        .box { width: 70px; height: 70px; border-radius: 10px; } 
        .box.p1 { background: #a1c4fd; transform: scale(0.9); } .box.p2 { background: #ffb8b8; transform: scale(0.9); }
        #status { margin-top: 25px; font-size: 1.5rem; font-weight: bold; height: 35px; }
    </style>
</head>
<body>
    <div class="header-title">Bubble Territory</div><a href="index.html" class="subtitle">⬅ Back</a>
    <div class="scoreboard"><span style="color:#a1c4fd" id="n1">P1</span>: <span id="s1">0</span> | <span style="color:#ffb8b8" id="n2">P2</span>: <span id="s2">0</span></div>
    <div class="board" id="board"></div>
    <div id="status"></div>
    <button class="btn" onclick="init()" style="margin-top:20px;">Play Again</button>

    <script>
        let p1 = localStorage.getItem('p1Name') || "P1", p2 = localStorage.getItem('p2Name') || "P2";
        let turn, active, boxes, scores;

        // Simplified Reset Function
        function init() {
            $('#board').empty(); turn = 1; active = true; boxes = []; scores = {1:0, 2:0};
            $('#n1').text(p1); $('#n2').text(p2); $('#s1').text('0'); $('#s2').text('0');
            $('#status').text(p1 + "'s Turn").css("color", "#a1c4fd");
            
            // Build 4x4 Boxes Grid
            for (let r=0; r<9; r++) for (let c=0; c<9; c++) {
                let el = $(`<div id="c-${r}-${c}"></div>`);
                if (r%2==0 && c%2==0) el.addClass('dot'); 
                else if (r%2==0) el.addClass('line h'); 
                else if (c%2==0) el.addClass('line v');
                else { el.addClass('box'); boxes.push({id:`c-${r}-${c}`, r, c}); }
                $('#board').append(el);
            }
        }

        $(document).on('click', '.line:not(.active)', function() {
            if(!active) return;
            let turnClass = 'p' + turn;
            $(this).addClass('active ' + turnClass); let made = false;
            
            // Simplified Box Detection
            boxes.forEach(b => {
                let $b = $('#'+b.id); if($b.hasClass('p1') || $b.hasClass('p2')) return;
                if($('#c-'+(b.r-1)+'-'+b.c).hasClass('active') && $('#c-'+(b.r+1)+'-'+b.c).hasClass('active') && $('#c-'+b.r+'-'+(b.c-1)).hasClass('active') && $('#c-'+b.r+'-'+(b.c+1)).hasClass('active')) {
                    $b.addClass(turnClass); scores[turn]++; made = true;
                }
            });
            if(!made) turn = (turn == 1 ? 2 : 1);
            $('#s1').text(scores[1]); $('#s2').text(scores[2]);
            
            // Check Win Condition (All 16 boxes full)
            if(scores[1] + scores[2] == 16) {
                active = false;
                let winner = scores[1]>scores[2]?p1:p2;
                $('#status').text(winner+" Wins!");
                
                // standard browser alert
                setTimeout(() => { alert(winner + " Wins!"); }, 100); 
                
                // AJAX save win
                $.post('Score.php', {action:'save_win', winner: winner});
            } else { $('#status').text((turn==1?p1:p2)+"'s Turn").css("color", turn==1?"#a1c4fd":"#ffb8b8"); }
        });
        init();
    </script>
</body>
</html>
